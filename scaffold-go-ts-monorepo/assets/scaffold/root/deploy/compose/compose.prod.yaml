services:
  api:
    image: "${API_IMAGE:?API_IMAGE must reference an existing versioned image tag}"
    pull_policy: never
    restart: unless-stopped

  web:
    image: "${WEB_IMAGE:?WEB_IMAGE must reference an existing versioned image tag}"
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${PROD_WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 10
